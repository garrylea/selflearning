<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri Multimedia PoC</title>
  <style>
    body { font-family: system-ui; padding: 20px; text-align: center; background: #f4f4f9; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { padding: 10px 20px; margin: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    #record-btn { background: #ff4757; color: white; }
    #stop-btn { background: #2f3542; color: white; display: none; }
    #play-btn { background: #2ed573; color: white; display: none; }
    .status { margin: 10px; color: #57606f; font-size: 0.9em; }
    audio { margin-top: 20px; width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <h2>录音能力验证</h2>
    <div class="status" id="status">准备就绪</div>
    <button id="record-btn">开始录音</button>
    <button id="stop-btn">停止录音</button>
    <div id="audio-container"></div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
